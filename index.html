<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国語表現　ノベルゲーム</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    overflow: hidden;
    background: #000000;
    color: #ffffff;
    font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif;
    touch-action: manipulation;
  }

  .screen {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  /* 注意事項画面 */
  #noticeScreen {
    z-index: 50;
    background: #ffffff;
    color: #222222;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }

  #noticeScreen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  #noticeText {
    width: min(86vw, 760px);
    text-align: center;
    font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
    font-size: clamp(15px, 4vw, 22px);
    line-height: 2.0;
    letter-spacing: 0.04em;
    opacity: 0;
    transform: translateY(8px);
    animation: noticeIn 1.8s ease forwards;
  }

  #noticeGuide {
    position: fixed;
    bottom: 8vh;
    width: 100%;
    text-align: center;
    color: #888888;
    font-size: clamp(12px, 3.2vw, 15px);
    letter-spacing: 0.08em;
    opacity: 0;
    animation: guideIn 1.0s ease 1.3s forwards;
  }

  @keyframes noticeIn {
    from { opacity: 0; transform: translateY(8px); filter: blur(2px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  @keyframes guideIn {
    from { opacity: 0; }
    to { opacity: 0.65; }
  }

  /* タイトル画面 */
  #titleScreen {
    z-index: 40;
    display: none;
    align-items: center;
    justify-content: center;
    background-image: url("title_shonen.jpg");
    background-size: cover;
    background-position: center center;
  }

  #titleContent {
    width: 88vw;
    text-align: center;
    transform: translateY(-2vh);
    font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
    text-shadow: 0 3px 14px rgba(70, 45, 20, 0.45);
  }

  #gameTitle {
    margin: 0;
    color: #ffffff;
    font-size: clamp(38px, 12vw, 76px);
    font-weight: 700;
    letter-spacing: 0.08em;
    line-height: 1.25;
  }

  #gameCaption {
    margin-top: 16px;
    color: #ffffff;
    font-size: clamp(15px, 4.6vw, 24px);
    letter-spacing: 0.08em;
  }

  .titleArrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: clamp(44px, 12vw, 64px);
    height: clamp(44px, 12vw, 64px);
    border: 2px solid rgba(255,255,255,0.85);
    border-radius: 50%;
    background: rgba(0,0,0,0.24);
    color: #ffffff;
    font-size: clamp(26px, 8vw, 38px);
    cursor: pointer;
    z-index: 45;
  }

  #prevGameButton { left: 4vw; }
  #nextGameButton { right: 4vw; }

  #startButton {
    margin-top: clamp(30px, 7vh, 58px);
    padding: 10px 44px 12px;
    min-width: min(68vw, 320px);
    border: 4px solid rgba(255,255,255,0.92);
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    color: #ffffff;
    font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
    font-size: clamp(25px, 8vw, 42px);
    letter-spacing: 0.08em;
    cursor: pointer;
  }

  /* 本編画面 */
  #mainScreen {
    z-index: 20;
    display: none;
    background-image: url("main_bg.jpg");
    background-size: cover;
    background-position: center center;
  }

  #standImage {
    position: absolute;
    height: 56vh;
    left: 50%;
    bottom: 24vh;
    transform: translateX(-50%);
    display: none;
    pointer-events: none;
    filter: drop-shadow(0 10px 12px rgba(0,0,0,0.25));
  }

  #standImage.visible { display: block; }

  #choices {
    position: absolute;
    left: 5vw;
    right: 5vw;
    bottom: calc(4vh + 31vh);
    display: none;
    flex-direction: column;
    gap: 10px;
    z-index: 5;
  }

  .choice {
    width: 100%;
    margin: 0 auto;
    padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.92);
    border-radius: 12px;
    background: rgba(0,0,0,0.68);
    color: #ffffff;
    font-size: clamp(15px, 4.2vw, 20px);
    cursor: pointer;
    text-align: left;
    transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }

  .choice.selected,
  .choice:hover,
  .choice:focus-visible {
    background: rgba(255,216,107,0.92);
    color: #111111;
    transform: translateY(-2px);
    outline: none;
  }

  #textbox {
    position: absolute;
    left: 4vw;
    right: 4vw;
    bottom: 4vh;
    min-height: 27vh;
    max-height: 33vh;
    padding: 18px 18px 32px;
    background: rgba(0,0,0,0.74);
    border: 2px solid rgba(255,255,255,0.82);
    border-radius: 16px;
    z-index: 4;
  }

  #name {
    margin-bottom: 9px;
    color: #ffd86b;
    font-weight: bold;
    font-size: clamp(15px, 4.2vw, 20px);
  }

  #text {
    font-size: clamp(16px, 4.4vw, 22px);
    line-height: 1.72;
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }

  #next {
    position: absolute;
    right: 20px;
    bottom: 12px;
    font-size: clamp(13px, 3.5vw, 16px);
    opacity: 0.85;
    display: none;
  }

  /* END画面 */
  #endScreen {
    z-index: 35;
    display: none;
    background: #000000;
    color: #ffffff;
    font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
  }

  #endTitle {
    position: absolute;
    top: 14vh;
    width: 100%;
    text-align: center;
    font-size: clamp(32px, 10vw, 56px);
    text-decoration: underline;
    text-underline-offset: 10px;
    letter-spacing: 0.12em;
  }

  #endMessage {
    position: absolute;
    top: 46vh;
    width: 100%;
    transform: translateY(-50%);
    text-align: center;
    font-size: clamp(32px, 10vw, 68px);
    line-height: 1.65;
    letter-spacing: 0.08em;
    white-space: pre-wrap;
  }

  #endGuide {
    position: absolute;
    bottom: 8vh;
    width: 100%;
    text-align: center;
    opacity: 0.8;
    font-size: clamp(13px, 4vw, 18px);
  }

  #endMark {
    position: absolute;
    right: 6vw;
    bottom: 6vh;
    width: min(26vw, 160px);
    height: auto;
  }

  /* 作品説明画面 */
  #infoScreen {
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    background-image: url("ending_bg.jpg");
    background-size: cover;
    background-position: center center;
    color: #111111;
    font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
  }

  #infoPanel {
    width: 88vw;
    min-height: 62vh;
    max-height: 86vh;
    overflow-y: auto;
    padding: 34px 24px 28px;
    background: rgba(255,255,255,0.76);
    border-radius: 36px;
  }

  #workTitle {
    margin: 0;
    text-align: center;
    font-size: clamp(30px, 9vw, 56px);
    font-weight: 500;
    letter-spacing: 0.12em;
  }

  #workAuthor {
    margin: 16px 0 30px;
    text-align: center;
    font-size: clamp(18px, 5vw, 30px);
  }

  #workDescription {
    font-size: clamp(16px, 4.4vw, 24px);
    line-height: 1.75;
    white-space: pre-wrap;
  }

  #infoButtons {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 32px;
  }

  .infoButton {
    width: 100%;
    padding: 12px 24px;
    border: 3px solid rgba(80,55,35,0.76);
    border-radius: 999px;
    background: rgba(255,255,255,0.18);
    color: #1d1d1d;
    font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
    font-size: clamp(20px, 6vw, 34px);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }

  .infoButton:hover,
  .infoButton:focus-visible,
  #startButton:hover,
  #startButton:focus-visible,
  .titleArrow:hover,
  .titleArrow:focus-visible {
    background: rgba(255,216,107,0.88);
    color: #111111;
  }

  /* AUDIO / SKIP ボタン */
  .topButton {
    position: fixed;
    top: 12px;
    width: 72px;
    height: 34px;
    border: 2px solid rgba(255,255,255,0.82);
    border-radius: 999px;
    background: rgba(0,0,0,0.42);
    color: #ffffff;
    font-family: Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    cursor: pointer;
    z-index: 100;
    display: none;
    transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }

  #audioButton { right: 12px; }
  #skipButton { right: 92px; }

  .topButton.active,
  .topButton:hover,
  .topButton:focus-visible {
    background: rgba(255,216,107,0.92);
    color: #111111;
    transform: translateY(-1px);
    outline: none;
  }

  /* 暗転フェード */
  #fadeBlack {
    position: fixed;
    inset: 0;
    background: #000000;
    opacity: 0;
    pointer-events: none;
    z-index: 120;
    transition: opacity 0.25s ease;
  }

  #fadeBlack.active { opacity: 0.6; }

  #fadeBlack.longFade {
    transition: opacity 0.9s ease;
    opacity: 1;
  }

  /* 手袋を買いに専用：上に画像、下にテキスト */
  .illustrationMode #mainScreen {
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center 17vh;
    background-color: #000;
  }

  .illustrationMode #standImage {
    display: none !important;
  }

  .illustrationMode #textbox {
    left: 0;
    right: 0;
    bottom: 0;
    min-height: 34vh;
    max-height: 40vh;
    border-radius: 18px 18px 0 0;
  }

  .illustrationMode #choices {
    left: 5vw;
    right: 5vw;
    bottom: 42vh;
  }
  
  
  /* PC表示用の上書き */
  @media (min-width: 800px) {
    #standImage {
      height: min(82vh, 900px);
      bottom: 0;
    }

    #textbox {
      left: 8%;
      right: 8%;
      bottom: 7%;
      min-height: 190px;
      max-height: 260px;
      padding: 24px 24px 34px;
    }

    #choices {
      left: 8%;
      right: 8%;
      bottom: calc(7% + 220px);
    }

    #infoButtons {
      flex-direction: row;
      justify-content: center;
    }

    .infoButton {
      width: auto;
      min-width: 260px;
    }

    #infoPanel {
      width: min(74vw, 1220px);
      border-radius: 72px;
      padding: 50px 70px;
    }

    .topButton { top: 18px; }
    #audioButton { right: 18px; }
    #skipButton { right: 100px; }
  }
</style>
</head>

<body>
<section id="noticeScreen" class="screen">
  <div id="noticeText">
    このゲームは国語表現授業内で<br>制作されたものです<br>
    作品元の著者・出版社様とは<br>一切関係ありません<br>
    内容はすべてフィクションです<br>
    音が出ます。
  </div>
  <div id="noticeGuide">クリック / Enterで進む</div>
</section>

<section id="titleScreen" class="screen">
  <button id="prevGameButton" class="titleArrow">←</button>
  <div id="titleContent">
    <h1 id="gameTitle"></h1>
    <div id="gameCaption"></div>
    <button id="startButton">スタート</button>
  </div>
  <button id="nextGameButton" class="titleArrow">→</button>
</section>

<section id="mainScreen" class="screen">
  <img id="standImage" src="" alt="立ち絵">
  <div id="choices"></div>
  <div id="textbox">
    <div id="name"></div>
    <div id="text"></div>
    <div id="next">▼ 次へ</div>
  </div>
</section>

<section id="endScreen" class="screen">
  <div id="endTitle"></div>
  <div id="endMessage"></div>
  <div id="endGuide">クリック / Enterで進む</div>
  <img id="endMark" src="ending_mark.png" alt="制作・著作マーク">
</section>

<section id="infoScreen" class="screen">
  <div id="infoPanel">
    <h1 id="workTitle"></h1>
    <div id="workAuthor"></div>
    <div id="workDescription"></div>
    <div id="infoButtons">
      <button id="restartButton" class="infoButton">もう一度遊ぶ</button>
      <button id="backTitleButton" class="infoButton">タイトルに戻る</button>
    </div>
  </div>
</section>

<button id="audioButton" class="topButton">AUDIO</button>
<button id="skipButton" class="topButton">SKIP</button>

<div id="fadeBlack"></div>

  osikuraBgm: osikuraBgm,
  yukiBgm: yukiBgm,
  kisekiBgm: kisekiBgm,
  kodokuBgm: kodokuBgm,
  kokorobgm: kokorobgm,
  memeBgm:memeBgm
  
  };

  const soundElements = {
    decisionSound: decisionSound,
    breakSound: breakSound
  };

  titleBgm.volume = 0.55;
  mainBgm.volume = 0.48;
  altBgm.volume = 0.48;
  decisionSound.volume = 0.7;
  breakSound.volume = 0.8;

  function playSoundById(soundId) {
    const sound = soundElements[soundId];
    if (!sound || !soundReady) return;

    sound.currentTime = 0;
    sound.play().catch(() => {});
  }

  function playDecisionSound() {
    playSoundById("decisionSound");
  }

  function playSceneSound(soundName) {
    const soundId = commonSounds[soundName];
    playSoundById(soundId);
  }

function setAudioMuted(muted) {
  audioMuted = muted;

  titleBgm.muted = muted;

  Object.values(bgmElements).forEach((bgm) => {
    if (!bgm) return;
    bgm.muted = muted;
  });

  decisionSound.muted = muted;
  breakSound.muted = muted;

  audioButton.classList.toggle("active", muted);
}

  function setSkipMode(enabled) {
    skipMode = enabled;
    skipButton.classList.toggle("active", enabled);
  }

function stopAllBgm() {
  titleBgm.pause();

  Object.values(bgmElements).forEach((bgm) => {
    if (!bgm) return;
    bgm.pause();
    bgm.currentTime = 0;
  });
}

  function restartAndPlay(audio) {
    audio.pause();
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }

  function playTitleBgmFromStart() {
    stopAllBgm();
    restartAndPlay(titleBgm);
    currentBgm = "title";
  }

  function playBgm(bgmName, forceRestart = false) {
    if (currentBgm === bgmName && !forceRestart) return;

    stopAllBgm();
    currentBgm = bgmName;

    if (bgmName === "none") return;

    const bgmId = currentWork.assets.bgms[bgmName];
    const bgm = bgmElements[bgmId];

    if (!bgm) return;

    bgm.currentTime = 0;
    bgm.play().catch(() => {});
  }

  function applyTextVariables(text) {
    return text
      .replaceAll("{firstCicada}", state.firstCicada)
      .replaceAll("{secondCicada}", state.secondCicada);
  }

  function resetState() {
    state.firstCicada = "";
    state.secondCicada = "";
    state.kokoroFirst = "";
    state.kokoroSecond = "";
    state.kokoroThird = "";
    state.kokoroFourth = "";
  }

  function updateTitleScreen() {
    currentWork = works[selectedWorkIndex];
    scenario = currentWork.scenario;

    gameTitle.textContent = currentWork.title;
    gameCaption.textContent = currentWork.caption;
    titleScreen.style.backgroundImage = `url("${currentWork.titleBg}")`;
  }

  function switchWork(direction) {
    playDecisionSound();

    selectedWorkIndex = (selectedWorkIndex + direction + works.length) % works.length;
    updateTitleScreen();

  }

  function showOnly(screen) {
    noticeScreen.style.display = "none";
    titleScreen.style.display = "none";
    mainScreen.style.display = "none";
    endScreen.style.display = "none";
    infoScreen.style.display = "none";

    screen.style.display = screen === titleScreen || screen === infoScreen ? "flex" : "block";
  }

  function fadeAction(action, long = false) {
    if (changingScene) return;

    changingScene = true;
    playDecisionSound();
    fadeBlack.classList.add(long ? "longFade" : "active");

    setTimeout(() => {
      action();
      fadeBlack.classList.remove(long ? "longFade" : "active");
      changingScene = false;
    }, long ? 950 : 260);
  }

  function showTitle() {
    showOnly(titleScreen);

    audioButton.style.display = "block";
    skipButton.style.display = "block";

    updateTitleScreen();
    playTitleBgmFromStart();
  }

  function startMain() {
    resetState();

    currentWork = works[selectedWorkIndex];
    scenario = currentWork.scenario;

    currentBg = "";
    currentCharacter = "";
    currentBgm = "";
    currentPageIndex = 0;

    showOnly(mainScreen);
    showScene("start", true);
  }

  function showInfoScreen() {
    const info = currentWork.info;

    infoScreen.style.backgroundImage = `url("${info.bg}")`;
    workTitle.textContent = info.title;
    workAuthor.textContent = info.author;
    workDescription.textContent = info.description;

    showOnly(infoScreen);
    playTitleBgmFromStart();
  }

  function needsFade(nextScene) {
    const nextBg = nextScene.bg || "main";
    const nextCharacter = nextScene.character || "none";

    if (nextBg !== currentBg) return true;
    if (nextCharacter !== currentCharacter) return true;

    return false;
  }

function judgeKokoroEnding() {
  const route = state.kokoroFirst + state.kokoroSecond + state.kokoroThird + state.kokoroFourth;

  if (route === "ADFH") return "end1";
  if (route === "BDFH") return "end4";
  if (route === "BDFI") return "end5";

  return "end2";
}

function goToScene(id) {
  if (id === "kokoroJudge") {
    goToScene(judgeKokoroEnding());
    return;
  }

  const nextScene = scenario[id];

  if (!nextScene) {
    alert("場面が見つかりません: " + id);
    return;
  }

  if (needsFade(nextScene)) {
    fadeAction(() => showScene(id));
  } else {
    playDecisionSound();
    showScene(id);
  }
}

  function getPages(scene) {
    if (scene.pages) return scene.pages;

    if (scene.text) {
      return [
        {
          name: scene.name || "",
          text: scene.text
        }
      ];
    }

    return [
      {
        name: "",
        text: ""
      }
    ];
  }

  function showScene(id, forceRestartBgm = false) {
    current = id;
    currentPageIndex = 0;

    const scene = scenario[id];
    

    if (currentWork.layout === "illustration") {
      document.body.classList.add("illustrationMode");
    } else {
      document.body.classList.remove("illustrationMode");
    }

 

    const bgName = scene.bg || "main";
    const characterName = scene.character || "none";
    const bgmName = scene.bgm || "main";
    const soundName = scene.sound;

    const bgFile = currentWork.assets.backgrounds[bgName];
    const characterFile = currentWork.assets.characters[characterName];

    if (bgFile) {
      mainScreen.style.backgroundImage = `url("${bgFile}")`;
      currentBg = bgName;
    }

    if (characterFile) {
      standImage.src = characterFile;
      standImage.classList.add("visible");
      currentCharacter = characterName;
    } else {
      standImage.classList.remove("visible");
      currentCharacter = "none";
    }

    playBgm(bgmName, forceRestartBgm);

    if (soundName) {
      playSceneSound(soundName);
    }

    showPage(currentPageIndex);
  }

  function showPage(pageIndex) {
    const scene = scenario[current];
    const pages = getPages(scene);
    const page = pages[pageIndex];

    const pageName = page.name ?? scene.name ?? "";
    const pageText = page.text ?? "";

    nameBox.textContent = pageName;
    nameBox.style.display = pageName ? "block" : "none";

    textBox.textContent = "";
    choicesBox.innerHTML = "";
    choicesBox.style.display = "none";
    nextMark.style.display = "none";

    currentPageText = applyTextVariables(pageText);
    charIndex = 0;
    typing = true;

    if (skipMode) {
      finishText();
    } else {
      typeText(currentPageText);
    }
  }

  function typeText(fullText) {
    if (charIndex < fullText.length) {
      textBox.textContent += fullText.charAt(charIndex);
      charIndex++;
      setTimeout(() => typeText(fullText), 34);
    } else {
      typing = false;
      showNextOrChoices();
    }
  }

  function finishText() {
    textBox.textContent = currentPageText;
    charIndex = currentPageText.length;
    typing = false;
    showNextOrChoices();
  }

  function showNextOrChoices() {
    const scene = scenario[current];
    const pages = getPages(scene);

    if (currentPageIndex < pages.length - 1) {
      nextMark.style.display = "block";
      return;
    }

    if (scene.choices) {
      showChoices(scene.choices);
      return;
    }

    if (scene.endTitle && scene.endMessage) {
      nextMark.style.display = "block";
      return;
    }

    if (scene.next) {
      nextMark.style.display = "block";
    }
  }

  function nextPageOrScene() {
    const scene = scenario[current];
    const pages = getPages(scene);

    if (currentPageIndex < pages.length - 1) {
      currentPageIndex++;
      showPage(currentPageIndex);
      return;
    }

    if (scene.endTitle && scene.endMessage) {
      fadeAction(() => showEndScreen(scene.endTitle, scene.endMessage), true);
      return;
    }

    if (scene.next) {
      goToScene(scene.next);
    }
  }

  function handleChoice(choice) {
    if (choice.set) {
      Object.assign(state, choice.set);
    }

    if (choice.answer) {
      state.secondCicada = choice.answer;

      if (choice.answer === state.firstCicada) {
        goToScene("cicadaCorrect");
      } else {
        goToScene("cicadaWrong");
      }

      return;
    }

    goToScene(choice.next);
  }

function getAvailableChoices(choices) {
  return choices.filter((choice) => {
    if (choice.hideIf && choice.hideIf()) return false;
    return true;
  });
}

function showChoices(choices) {
  const availableChoices = getAvailableChoices(choices);

  choicesBox.innerHTML = "";
  choicesBox.style.display = "flex";
  selectedChoice = 0;

  availableChoices.forEach((choice, index) => {
    const button = document.createElement("button");

    button.textContent = choice.text;
    button.className = "choice";

    if (index === selectedChoice) {
      button.classList.add("selected");
    }

    button.onclick = (event) => {
      event.stopPropagation();
      selectedChoice = index;
      updateChoiceSelection();
      handleChoice(choice);
    };

    button.onpointerenter = () => {
      selectedChoice = index;
      updateChoiceSelection();
    };

    choicesBox.appendChild(button);
  });
}
  
  function updateChoiceSelection() {
    const buttons = document.querySelectorAll(".choice");

    buttons.forEach((button, index) => {
      button.classList.toggle("selected", index === selectedChoice);
    });
  }

  function showEndScreen(title, message) {
    showOnly(endScreen);

    endTitle.textContent = title;
    endMessage.textContent = "";

    currentEndMessage = message;
    endCharIndex = 0;
    endTyping = true;

    if (skipMode) {
      finishEndMessage();
    } else {
      typeEndMessage(message);
    }
  }

  function typeEndMessage(message) {
    if (endCharIndex < message.length) {
      endMessage.textContent += message.charAt(endCharIndex);
      endCharIndex++;
      setTimeout(() => typeEndMessage(message), 65);
    } else {
      endTyping = false;
    }
  }

  function finishEndMessage() {
    endMessage.textContent = currentEndMessage;
    endTyping = false;
  }

  function proceedEndScreen() {
    if (endTyping) {
      finishEndMessage();
      return;
    }

    fadeAction(showInfoScreen, true);
  }

  function proceed() {
    if (changingScene) return;

    const scene = scenario[current];

    if (typing) {
      finishText();
      return;
    }

    if (scene.choices && currentPageIndex >= getPages(scene).length - 1) {
      handleChoice(scene.choices[selectedChoice]);
      return;
    }

    nextPageOrScene();
  }

  audioButton.addEventListener("click", (event) => {
    event.stopPropagation();
    setAudioMuted(!audioMuted);
  });

  skipButton.addEventListener("click", (event) => {
    event.stopPropagation();
    setSkipMode(!skipMode);

    if (typing) finishText();
    if (endTyping) finishEndMessage();
  });

  prevGameButton.addEventListener("click", (event) => {
    event.stopPropagation();
    switchWork(-1);
  });

  nextGameButton.addEventListener("click", (event) => {
    event.stopPropagation();
    switchWork(1);
  });

  noticeScreen.addEventListener("click", () => {
    soundReady = true;
    fadeAction(showTitle);
  });

  startButton.addEventListener("click", (event) => {
    event.stopPropagation();
    fadeAction(startMain);
  });

  restartButton.addEventListener("click", (event) => {
    event.stopPropagation();
    fadeAction(startMain);
  });

  backTitleButton.addEventListener("click", (event) => {
    event.stopPropagation();
    fadeAction(showTitle);
  });

  endScreen.addEventListener("click", () => {
    proceedEndScreen();
  });

  document.addEventListener("click", (event) => {
    if (mainScreen.style.display !== "none" && !event.target.classList.contains("choice")) {
      proceed();
    }
  });

  document.addEventListener("keydown", (event) => {
    if (!["Enter", " ", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.key)) {
      return;
    }

    if (noticeScreen.style.display !== "none") {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        soundReady = true;
        fadeAction(showTitle);
      }
      return;
    }

    if (titleScreen.style.display !== "none") {
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        switchWork(-1);
        return;
      }

      if (event.key === "ArrowRight") {
        event.preventDefault();
        switchWork(1);
        return;
      }

      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        fadeAction(startMain);
      }
      return;
    }

    if (endScreen.style.display !== "none") {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        proceedEndScreen();
      }
      return;
    }

    if (infoScreen.style.display !== "none") {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        fadeAction(startMain);
      }
      return;
    }

    const scene = scenario[current];

    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      proceed();
      return;
    }

    if (scene.choices && !typing) {
      if (event.key === "ArrowDown") {
        event.preventDefault();
        selectedChoice = (selectedChoice + 1) % scene.choices.length;
        updateChoiceSelection();
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        selectedChoice = (selectedChoice - 1 + scene.choices.length) % scene.choices.length;
        updateChoiceSelection();
      }
    }
  });

  updateTitleScreen();
</script>
</body>
</html>
